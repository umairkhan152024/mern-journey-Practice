<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="GitHub User Explorer - Search any GitHub profile"
    />
    <title>GitHub User Explorer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>GitHub User Explorer</h1>

      <!-- Search Box -->
      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          placeholder="Enter GitHub username..."
        />
        <button id="searchBtn">Search</button>
      </div>

      <!-- Error Message -->
      <div id="error" class="error hidden">
        User not found! Please try another username.
      </div>

      <!-- Profile Card -->
      <div id="profile" class="profile hidden">
        <img id="avatar" src="" alt="Profile Picture" />
        <div class="info">
          <h2 id="devName"></h2>
          <p id="bio"></p>
          <div class="stats">
            <div class="stat">
              <span id="repos"></span>
              <p>Repositories</p>
            </div>
            <div class="stat">
              <span id="followers"></span>
              <p>Followers</p>
            </div>
            <div class="stat">
              <span id="following"></span>
              <p>Following</p>
            </div>
          </div>
          <a id="githubLink" href="" target="_blank" rel="noopener">
            View GitHub Profile
          </a>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
